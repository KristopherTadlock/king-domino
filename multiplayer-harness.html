<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>King Domino Multiplayer Harness</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #111318;
        color: #f3f5f8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(180deg, rgba(24, 28, 36, 0.96), rgba(13, 15, 20, 0.98)),
          #111318;
      }

      .shell {
        display: grid;
        grid-template-rows: auto 1fr;
        min-height: 100vh;
      }

      .toolbar {
        display: grid;
        grid-template-columns: minmax(220px, 1fr) auto;
        gap: 14px;
        align-items: center;
        padding: 12px 14px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.10);
        background: rgba(20, 23, 30, 0.94);
      }

      .title {
        display: flex;
        flex-wrap: wrap;
        align-items: baseline;
        gap: 10px;
        min-width: 0;
      }

      h1 {
        margin: 0;
        font-size: 16px;
        font-weight: 800;
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        color: #aeb7c4;
        font-size: 12px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        min-height: 24px;
        padding: 3px 8px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
      }

      .pill strong {
        margin-left: 4px;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 8px;
      }

      .linkGroup {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      button,
      a.button,
      input,
      select {
        appearance: none;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 7px;
        min-height: 34px;
        padding: 7px 10px;
        color: #f3f6fb;
        background: rgba(255, 255, 255, 0.08);
        font: inherit;
        font-size: 13px;
        font-weight: 700;
        text-decoration: none;
        cursor: pointer;
      }

      button:hover,
      a.button:hover,
      select:hover {
        border-color: rgba(255, 255, 255, 0.28);
        background: rgba(255, 255, 255, 0.13);
      }

      .primary {
        background: #2f7adf;
        border-color: rgba(160, 203, 255, 0.55);
      }

      .primary:hover {
        background: #3989f5;
      }

      .boards {
        display: grid;
        grid-template-columns: repeat(var(--client-cols, 2), minmax(320px, 1fr));
        gap: 10px;
        min-height: 0;
        padding: 10px;
      }

      .client {
        display: grid;
        grid-template-rows: auto auto 1fr;
        min-width: 0;
        min-height: 0;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 8px;
        background: #0d1016;
      }

      .clientHeader {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.10);
        background: rgba(255, 255, 255, 0.045);
      }

      .clientTitle {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
        font-size: 13px;
        font-weight: 800;
      }

      .swatch {
        width: 11px;
        height: 11px;
        border-radius: 999px;
        box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.08);
      }

      .clientState {
        flex: 0 0 auto;
        color: #b7c1cf;
        font-size: 12px;
        font-weight: 800;
      }

      .slotControls {
        display: grid;
        grid-template-columns: minmax(120px, 1fr) repeat(3, auto);
        gap: 6px;
        padding: 8px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.03);
      }

      .nameInput {
        min-height: 34px;
        background: rgba(255, 255, 255, 0.06);
      }

      .frameWrap {
        position: relative;
        min-height: 0;
        background: #111318;
      }

      .emptyState {
        position: absolute;
        inset: 0;
        display: grid;
        place-content: center;
        gap: 6px;
        padding: 24px;
        color: #aeb7c4;
        text-align: center;
        background:
          radial-gradient(circle at 50% 32%, rgba(88, 124, 190, 0.14), transparent 36%),
          #111318;
      }

      .emptyState strong {
        color: #f3f6fb;
        font-size: 15px;
      }

      iframe {
        width: 100%;
        height: 100%;
        min-height: 680px;
        border: 0;
        background: #111318;
      }

      iframe[hidden],
      .emptyState[hidden] {
        display: none;
      }

      .copyState {
        color: #98e6aa;
        font-size: 12px;
        min-width: 70px;
      }

      @media (max-width: 900px) {
        .toolbar {
          grid-template-columns: 1fr;
        }

        .actions {
          justify-content: flex-start;
        }

        .boards {
          grid-template-columns: 1fr;
        }

        iframe {
          min-height: 760px;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="toolbar">
        <div class="title">
          <h1>Multiplayer Harness</h1>
          <div class="meta">
            <span class="pill">Room <strong id="roomLabel"></strong></span>
            <span class="pill">Seed <strong id="seedLabel"></strong></span>
            <span class="pill"><strong id="clientCountLabel"></strong> clients, one local server</span>
          </div>
        </div>
        <div class="actions">
          <select id="playerCount" aria-label="Player count">
            <option value="2">2 players</option>
            <option value="3">3 players</option>
            <option value="4">4 players</option>
          </select>
          <button id="copyInvite" type="button">Copy Invite Link</button>
          <span id="clientLinks" class="linkGroup"></span>
          <button id="blankAll" type="button">Blank All</button>
          <button id="inviteAll" type="button">Load Invites</button>
          <button id="joinExpected" type="button">Join Expected</button>
          <button id="reloadPlayers" type="button">Reload Players</button>
          <button id="newRoom" class="primary" type="button">New Room</button>
          <span id="copyState" class="copyState" aria-live="polite"></span>
        </div>
      </header>

      <section id="boards" class="boards" aria-label="Multiplayer clients">
      </section>
    </main>

    <script type="module">
      const params = new URL(location.href).searchParams;

      function randomRoom() {
        return `dev-${Math.random().toString(36).slice(2, 8)}`;
      }

      function normalizeRoom(value) {
        const clean = String(value || '').trim().replace(/[^a-z0-9-]/gi, '').slice(0, 24);
        return clean || randomRoom();
      }

      function normalizeName(value, fallback) {
        const clean = String(value || '').trim().slice(0, 24);
        return clean || fallback;
      }

      function normalizePlayerCount(value) {
        const count = Number.parseInt(value, 10);
        if (!Number.isFinite(count)) return 2;
        return Math.max(2, Math.min(4, count));
      }

      const fallbackNames = ['Codex', 'Michael', 'Alex', 'Taylor'];
      const slotModes = new Set(['empty', 'invite', 'joined']);

      const state = {
        room: normalizeRoom(params.get('room')),
        seed: Number.parseInt(params.get('seed') || '123', 10) || 123,
        playerCount: normalizePlayerCount(params.get('players') || params.get('playerCount')),
        names: [],
        slots: [],
      };
      for (let i = 0; i < 4; i++) {
        const legacy = i === 0 ? params.get('hostName') : i === 1 ? params.get('friendName') : null;
        state.names[i] = normalizeName(params.get(`name${i + 1}`) || legacy, fallbackNames[i]);
        const mode = params.get(`slot${i + 1}`);
        state.slots[i] = slotModes.has(mode) ? mode : (i < state.playerCount ? 'joined' : 'empty');
      }
      let friendLoadTimer = null;

      function syncUrl() {
        const url = new URL(location.href);
        url.searchParams.set('room', state.room);
        url.searchParams.set('seed', String(state.seed));
        url.searchParams.set('players', String(state.playerCount));
        for (let i = 0; i < 4; i++) {
          url.searchParams.set(`name${i + 1}`, state.names[i]);
          url.searchParams.set(`slot${i + 1}`, state.slots[i]);
        }
        history.replaceState(null, '', url);
      }

      function playerToken(index) {
        return `harness-player-${index + 1}-${state.room}`;
      }

      function gameUrl(name, token, extra = {}) {
        const url = new URL('/', location.href);
        url.searchParams.set('room', state.room);
        url.searchParams.set('seed', String(state.seed));
        url.searchParams.set('players', String(state.playerCount));
        url.searchParams.set('name', name);
        url.searchParams.set('playerToken', token);
        url.searchParams.set('v', 'mp-harness');
        for (const [key, value] of Object.entries(extra)) {
          if (value != null) url.searchParams.set(key, String(value));
        }
        return url.toString();
      }

      function inviteUrl(slotIndex = null) {
        const url = new URL('/', location.href);
        url.searchParams.set('room', state.room);
        url.searchParams.set('seed', String(state.seed));
        url.searchParams.set('players', String(state.playerCount));
        if (Number.isInteger(slotIndex)) {
          url.searchParams.set('suggestedName', state.names[slotIndex]);
          url.searchParams.set('joinToken', playerToken(slotIndex));
          url.searchParams.set('v', 'mp-harness');
        }
        return url.toString();
      }

      function slotUrl(index) {
        if (state.slots[index] === 'empty') return 'about:blank';
        if (state.slots[index] === 'invite') return inviteUrl(index);
        return gameUrl(state.names[index], playerToken(index));
      }

      function joinedCount() {
        return state.slots.slice(0, state.playerCount).filter((mode) => mode === 'joined').length;
      }

      function slotLabel(index) {
        const mode = state.slots[index];
        if (index >= state.playerCount) {
          return mode === 'joined' ? 'Spectator' : mode === 'invite' ? 'Invite Loaded' : 'Outside Room';
        }
        if (mode === 'empty') return 'Nothing Loaded';
        if (mode === 'invite') return 'Invite Loaded';
        return joinedCount() >= state.playerCount ? 'Game Loaded' : 'In Lobby';
      }

      function updateSlot(index, delay = 0) {
        const article = document.querySelector(`[data-slot="${index}"]`);
        if (!article) return;

        const mode = state.slots[index];
        const frame = article.querySelector('iframe');
        const empty = article.querySelector('.emptyState');
        const stateLabel = article.querySelector('.clientState');
        const titleText = article.querySelector('.clientTitleText');
        const nameInput = article.querySelector('.nameInput');
        const openLink = document.querySelector(`[data-open-slot="${index}"]`);
        const inRoom = index < state.playerCount;
        const href = slotUrl(index);

        article.classList.toggle('isInactive', !inRoom);
        stateLabel.textContent = slotLabel(index);
        titleText.textContent = `${state.names[index]} / ${inRoom ? `P${index + 1}` : 'spectator'}`;
        if (document.activeElement !== nameInput) nameInput.value = state.names[index];
        if (openLink) {
          openLink.href = gameUrl(state.names[index], playerToken(index));
          openLink.textContent = inRoom ? `Open P${index + 1}` : 'Open Spectator';
        }

        empty.hidden = mode !== 'empty';
        frame.hidden = mode === 'empty';
        const nextSrc = mode === 'empty' ? 'about:blank' : href;
        window.setTimeout(() => {
          if (frame.getAttribute('src') !== nextSrc) frame.src = nextSrc;
        }, delay);
      }

      function updateAllSlots() {
        syncUrl();
        document.getElementById('roomLabel').textContent = state.room;
        document.getElementById('seedLabel').textContent = String(state.seed);
        document.getElementById('clientCountLabel').textContent = `${state.playerCount} player room`;
        document.getElementById('playerCount').value = String(state.playerCount);
        document.querySelectorAll('[data-slot]').forEach((_, index) => updateSlot(index));
      }

      function setSlotMode(index, mode, delay = 0) {
        state.slots[index] = slotModes.has(mode) ? mode : 'empty';
        syncUrl();
        updateSlot(index, delay);
        document.querySelectorAll('[data-slot]').forEach((_, slotIndex) => {
          if (slotIndex !== index) updateSlot(slotIndex);
        });
      }

      function setAllSlots(mode) {
        friendLoadTimer?.clear?.();
        const timers = [];
        for (let i = 0; i < 4; i++) {
          state.slots[i] = i < state.playerCount || mode === 'empty' ? mode : 'empty';
        }
        syncUrl();
        for (let i = 0; i < 4; i++) {
          updateSlot(i, i < state.playerCount ? i * 550 : 0);
        }
        friendLoadTimer = {
          clear: () => timers.forEach(clearTimeout),
        };
      }

      function render() {
        syncUrl();
        const clients = Array.from({ length: 4 }, (_, index) => ({
          index,
          name: state.names[index],
          token: playerToken(index),
        }));

        document.getElementById('roomLabel').textContent = state.room;
        document.getElementById('seedLabel').textContent = String(state.seed);
        document.getElementById('clientCountLabel').textContent = `${state.playerCount} player room`;
        document.getElementById('playerCount').value = String(state.playerCount);

        const links = document.getElementById('clientLinks');
        const boards = document.getElementById('boards');
        links.innerHTML = '';
        boards.innerHTML = '';
        boards.style.setProperty('--client-cols', '2');
        friendLoadTimer?.clear?.();

        clients.forEach((client) => {
          const url = gameUrl(client.name, client.token);
          const link = document.createElement('a');
          link.className = 'button';
          link.dataset.openSlot = String(client.index);
          link.target = '_blank';
          link.rel = 'noreferrer';
          link.href = url;
          link.textContent = `Open P${client.index + 1}`;
          links.append(link);

          const article = document.createElement('article');
          article.className = 'client';
          const header = document.createElement('div');
          header.className = 'clientHeader';
          const title = document.createElement('div');
          title.className = 'clientTitle';
          const swatch = document.createElement('span');
          swatch.className = 'swatch';
          swatch.style.background = ['#4a9dff', '#57c76b', '#d495ff', '#ffbd5a'][client.index] || '#aeb7c4';
          const titleText = document.createElement('span');
          titleText.className = 'clientTitleText';
          titleText.textContent = `${client.name} / P${client.index + 1}`;
          title.append(swatch, titleText);
          const stateLabel = document.createElement('span');
          stateLabel.className = 'clientState';
          header.append(title, stateLabel);

          const controls = document.createElement('div');
          controls.className = 'slotControls';
          const nameInput = document.createElement('input');
          nameInput.className = 'nameInput';
          nameInput.type = 'text';
          nameInput.value = client.name;
          nameInput.maxLength = 24;
          nameInput.setAttribute('aria-label', `Player ${client.index + 1} name`);
          const clear = document.createElement('button');
          clear.type = 'button';
          clear.textContent = 'Blank';
          const invite = document.createElement('button');
          invite.type = 'button';
          invite.textContent = 'Invite';
          const join = document.createElement('button');
          join.type = 'button';
          join.className = 'primary';
          join.textContent = 'Join';
          controls.append(nameInput, clear, invite, join);

          nameInput.addEventListener('change', () => {
            state.names[client.index] = normalizeName(nameInput.value, fallbackNames[client.index]);
            syncUrl();
            updateSlot(client.index);
          });
          clear.addEventListener('click', () => setSlotMode(client.index, 'empty'));
          invite.addEventListener('click', () => setSlotMode(client.index, 'invite'));
          join.addEventListener('click', () => {
            state.names[client.index] = normalizeName(nameInput.value, fallbackNames[client.index]);
            setSlotMode(client.index, 'joined');
          });

          const frameWrap = document.createElement('div');
          frameWrap.className = 'frameWrap';
          const empty = document.createElement('div');
          empty.className = 'emptyState';
          const emptyTitle = document.createElement('strong');
          emptyTitle.textContent = 'Nothing loaded';
          const emptyCopy = document.createElement('span');
          emptyCopy.textContent = 'Load an invite or join this slot.';
          empty.append(emptyTitle, emptyCopy);
          const frame = document.createElement('iframe');
          frame.title = `Player ${client.index + 1}`;
          frame.src = 'about:blank';
          frameWrap.append(empty, frame);
          article.dataset.slot = String(client.index);
          article.append(header, controls, frameWrap);
          boards.append(article);
        });

        updateAllSlots();
      }

      document.getElementById('reloadPlayers').addEventListener('click', () => {
        document.querySelectorAll('iframe').forEach((frame) => frame.contentWindow?.location.reload());
      });

      document.getElementById('newRoom').addEventListener('click', () => {
        state.room = randomRoom();
        state.seed = Math.floor(Math.random() * 2 ** 32) >>> 0;
        for (let i = 0; i < 4; i++) {
          state.slots[i] = i < state.playerCount ? 'invite' : 'empty';
        }
        render();
      });

      document.getElementById('playerCount').addEventListener('change', (event) => {
        state.playerCount = normalizePlayerCount(event.target.value);
        state.room = randomRoom();
        state.seed = Math.floor(Math.random() * 2 ** 32) >>> 0;
        for (let i = 0; i < 4; i++) {
          state.slots[i] = i < state.playerCount ? 'invite' : 'empty';
        }
        render();
      });

      document.getElementById('blankAll').addEventListener('click', () => {
        setAllSlots('empty');
      });

      document.getElementById('inviteAll').addEventListener('click', () => {
        setAllSlots('invite');
      });

      document.getElementById('joinExpected').addEventListener('click', () => {
        setAllSlots('joined');
      });

      document.getElementById('copyInvite').addEventListener('click', async () => {
        const output = document.getElementById('copyState');
        try {
          await navigator.clipboard.writeText(inviteUrl());
          output.textContent = 'Copied';
          setTimeout(() => { output.textContent = ''; }, 1600);
        } catch {
          output.textContent = 'Copy failed';
        }
      });

      render();
    </script>
  </body>
</html>
